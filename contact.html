<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Palawan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="contact-section">
<div class="container">

<div class="contact-grid">

<div class="contact-info">
<h2>Get In Touch</h2>
<p>Have questions about Palawan? Send us a message.</p>

<div class="contact-detail">
<div class="contact-detail-icon">📍</div>
<div class="contact-detail-text">
<strong>Location</strong>
<span>Puerto Princesa City</span>
</div>
</div>

<div class="contact-detail">
<div class="contact-detail-icon">📞</div>
<div class="contact-detail-text">
<strong>Phone</strong>
<span>+63 48 433 2983</span>
</div>
</div>

</div>

<div class="contact-form">
<h3>Send Message</h3>

<form id="contactForm">

<div class="form-group">
<label>Name</label>
<input type="text" required>
<div class="form-error">Required field</div>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" required>
<div class="form-error">Required field</div>
</div>

<div class="form-group">
<label>Message</label>
<textarea required></textarea>
<div class="form-error">Required field</div>
</div>

<button class="btn-primary form-submit">
Send Message
</button>

<div class="form-success" id="formSuccess">
Your message has been sent successfully!
</div>

</form>
</div>

</div>
</div>
</section>

<script src="main.js"></script>
</body>
</html>
