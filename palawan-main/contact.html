<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Palawan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="contact-section">
<div class="container">

<div class="contact-grid">

<div class="contact-info">
<h2>Get In Touch</h2>
<p>Have questions about Palawan? Send us a message.</p>

<div class="contact-detail">
<div class="contact-detail-icon">📍</div>
<div class="contact-detail-text">
<strong>Location</strong>
<span>Puerto Princesa City</span>
</div>
</div>

<div class="contact-detail">
<div class="contact-detail-icon">📞</div>
<div class="contact-detail-text">
<strong>Phone</strong>
<span>+63 48 433 2983</span>
</div>
</div>

</div>

<div class="contact-form">
<h3>Send Message</h3>

<form id="contactForm">

<div class="form-group">
<label for="inquiryDestination">Target Destination</label>
      <select id="inquiryDestination" required style="width: 100%; padding: 12px; border: 1px solid var(--light-grey); border-radius: 6px; font-family: inherit; background-color: var(--white); color: var(--dark);">
        <option value="">-- Select Target Destination --</option>
        <option value="El Nido">El Nido</option>
        <option value="Coron">Coron</option>
        <option value="Puerto Princesa">Puerto Princesa</option>
        <option value="Balabac">Balabac</option>
      </select>
</div>

<div class="form-group">
      <label for="inquirySubject">Subject</label>
      <input type="text" id="inquirySubject" placeholder="e.g., Booking Inquiry Summer 2026" required>
      <div class="form-error" style="display: none;">Required field</div>
    </div>

<div class="form-group">
      <label for="inquiryMessage">Message Content</label>
      <textarea id="inquiryMessage" placeholder="Type your detailed message here..." required></textarea>
      <div class="form-error" style="display: none;">Required field</div>
    </div>

<button class="btn-primary form-submit">
Send Message
</button>

<div class="form-success" id="formSuccess">
Your message has been sent successfully!
</div>

</form>
</div>

</div>
</div>
</section>

<script src="main.js"></script>
</body>
</html>
