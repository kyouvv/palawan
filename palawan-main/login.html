<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Palawan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="auth-page">
        <div class="auth-bg-pattern"></div>

        <div class="auth-card">

            <div class="auth-header">
                <div class="auth-logo">PALAWAN</div>
                <p>Welcome Traveler</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-target="loginPanel">Login</button>
                <button class="auth-tab" data-target="signupPanel">Sign Up</button>
            </div>

            <div class="auth-body">

                <div class="auth-form-panel active" id="loginPanel">

                    <div id="loginAlert" class="auth-alert"></div>

                    <form class="auth-form" id="loginForm">

                        <div class="form-group">
                            <input id="loginEmail" type="email" placeholder="Email">
                        </div>

                        <div class="form-group">
                            <input id="loginPass" type="password" placeholder="Password">
                        </div>

                        <button class="btn-primary">
                            Login
                        </button>

                    </form>
                </div>

                <div class="auth-form-panel" id="signupPanel">

                    <div id="signupAlert" class="auth-alert"></div>

                    <form class="auth-form" id="signupForm">

                        <div class="form-group">
                            <input id="signupName" type="text" placeholder="Full Name">
                        </div>

                        <div class="form-group">
                            <input id="signupEmail" type="email" placeholder="Email">
                        </div>

                        <div class="form-group">
                            <input id="signupPass" type="password" placeholder="Password">
                        </div>

                        <div class="form-group">
                            <input id="signupConfirm" type="password" placeholder="Confirm Password">
                        </div>

                        <button class="btn-primary">
                            Create Account
                        </button>

                    </form>
                </div>

            </div>
        </div>
    </section>

    <script src="main.js"></script>
</body>

</html>
